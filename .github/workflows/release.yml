name: Release

# Tag push (v*) builds the three binaries + checksums and attaches them to a
# GitHub Release — the assets install.sh and the Homebrew formula download.
# workflow_dispatch is a dry run: same build, uploaded as workflow artifacts,
# no release created.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: engine

      - name: Cross-compile binaries
        working-directory: engine
        run: |
          mkdir -p ../dist
          for target in linux-x64 darwin-arm64 darwin-x64; do
            bun build src/cli.ts --compile --no-compile-autoload-dotenv \
              --target="bun-$target" --outfile "../dist/steck-$target"
          done

      - name: Generate checksums
        working-directory: dist
        run: sha256sum steck-* > checksums.txt && cat checksums.txt

      - name: Upload artifacts (dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: steck-binaries
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          dist/steck-linux-x64 dist/steck-darwin-arm64 dist/steck-darwin-x64
          dist/checksums.txt
          --title "$GITHUB_REF_NAME" --generate-notes

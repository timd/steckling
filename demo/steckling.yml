# Demo config — the smallest end-to-end Steckling setup.
# Run `steck up` from this directory (or any worktree of this repo).
version: 1

worktrees:
  dir: "../{repo}-trees"
  base: main

services:
  compose: ./compose.steckling.yml
  expose:
    postgres:
      container: 5432
      env: DATABASE_URL
      url: "postgres://steckling:steckling@localhost:{port}/steckling"

app:
  run: "bun run app/server.ts"
  port:
    env: PORT
    base: 4000

# Ticket identity (opt-in): branches like `eng-123-add-login` get ENG-style
# tickets parsed, injected as $STECKLING_TICKET, and shown in `steck list`.
ticket:
  pattern: "eng-\\d+"
  url: "https://example.com/issues/{ticket}"

hooks:
  provision: "bun run app/provision.ts"
  # postCreate/teardown run with the branch/ticket identity injected — a real
  # setup would call its tracker's CLI here. These echo (and append to
  # $E2E_HOOKS_LOG when set, which is how the e2e test observes them).
  postCreate: 'echo "postCreate ${STECKLING_TICKET:-no-ticket}" | tee -a "${E2E_HOOKS_LOG:-/dev/null}"'
  teardown: 'echo "teardown ${STECKLING_TICKET:-no-ticket}" | tee -a "${E2E_HOOKS_LOG:-/dev/null}"'

# Deploy this branch's agent to Railway (Path 1). `steck deploy --dry-run` shows
# exactly what would run; `steck deploy` ships it once you've linked a project.
# The agent (agent.ts) is a separate workload from the local app above.
agent:
  kind: service # always-on | scheduled
  start: "bun run agent.ts"
  build:
    dockerfile: ./Dockerfile

deploy:
  target: railway
  env:
    ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    HEARTBEAT_MS: "60000"

# Per-branch service stack for the demo. Steckling runs this as an isolated
# compose project (`-p steckling_<branch>_<hash>`) and supplies the host port via
# the STECKLING_PORT_POSTGRES env var.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: steckling
      POSTGRES_PASSWORD: steckling
      POSTGRES_DB: steckling
    ports:
      - "${STECKLING_PORT_POSTGRES:?host port injected by steckling}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steckling -d steckling"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
